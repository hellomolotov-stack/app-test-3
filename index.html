<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>хайкинг интеллигенция</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div id="subtitle" class="subtitle"></div>
        </header>
        <main id="mainContent" class="content"></main>
    </div>

    <!-- Нижнее плавающее меню -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item" id="navHome">
            <span class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 10L12 4L19 10V19H15V15H9V19H5V10Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </span>
            <span class="nav-label">главная</span>
        </div>
        <div class="nav-item" id="navHikes">
            <span class="nav-icon">
                <!-- Иконка календаря -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
                    <path d="M3 8H21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M8 2V6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M16 2V6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="nav-label">календарь</span>
        </div>
        <div class="nav-item" id="navMore">
            <span class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                    <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
                    <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
                </svg>
            </span>
            <span class="nav-label">меню</span>
        </div>
    </div>

    <!-- Всплывающее меню -->
    <div class="nav-popup" id="navPopup">
        <a href="#" class="popup-item" id="popupChat">💬 чат</a>
        <a href="#" class="popup-item" id="popupChannel">📰 канал клуба</a>
        <a href="#" class="popup-item" id="popupAbout">📖 о клубе</a>
        <a href="#" class="popup-item" id="popupPhilosophy">🧠 философия</a>
        <a href="#" class="popup-item" id="popupHiking">🥾 о хайкинге</a>
        <a href="#" class="popup-item" id="popupReviews">⭐ отзывы</a>
        <a href="#" class="popup-item" id="popupNewcomer">🫖 новичкам</a>
        <a href="#" class="popup-item" id="popupGift">🎁 подарить карту</a>
    </div>

    <div id="initial-loader" class="initial-loader"></div>
    <script src="app.js"></script>
</body>
</html>
