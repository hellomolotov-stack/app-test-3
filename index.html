<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>хайкинг интеллигенция</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div id="subtitle" class="subtitle"></div>
        </header>
        <main id="mainContent" class="content"></main>
    </div>

    <!-- Нижнее плавающее меню -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item" id="navHome">
            <span class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3L3 9L5 10.5L12 5L19 10.5L21 9L12 3Z" fill="currentColor"/>
                    <path d="M5 12V19H19V12L12 17L5 12Z" fill="currentColor"/>
                </svg>
            </span>
            <span class="nav-label">главная</span>
        </div>
        <div class="nav-item" id="navHikes">
            <span class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M8 2V6" stroke="currentColor" stroke-width="2"/>
                    <path d="M16 2V6" stroke="currentColor" stroke-width="2"/>
                    <path d="M3 10H21" stroke="currentColor" stroke-width="2"/>
                </svg>
            </span>
            <span class="nav-label">хайкинг</span>
        </div>
        <div class="nav-item" id="navMenu">
            <span class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="2" fill="currentColor"/>
                    <circle cx="20" cy="12" r="2" fill="currentColor"/>
                    <circle cx="4" cy="12" r="2" fill="currentColor"/>
                </svg>
            </span>
            <span class="nav-label">меню</span>
        </div>
    </div>

    <!-- Всплывающее меню (изначально скрыто) -->
    <div class="popup-menu" id="popupMenu">
        <a href="#" class="popup-item" id="popupChat">💬 чат</a>
        <a href="#" class="popup-item" id="popupChannel">📰 канал клуба</a>
        <a href="#" class="popup-item" id="popupGift">🎁 подарить карту</a>
    </div>

    <div id="initial-loader" class="initial-loader"></div>
    <script src="app.js"></script>
</body>
</html>
