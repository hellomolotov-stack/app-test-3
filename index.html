<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>хайкинг интеллигенция</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div id="subtitle" class="subtitle"></div>
        </header>
        <main id="mainContent" class="content"></main>
    </div>

    <!-- Нижнее плавающее меню -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item" id="navHome">
            <span class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 10L12 4L19 10V19H14V14H10V19H5V10Z" stroke="currentColor" stroke-width="1.8" fill="none"/>
                </svg>
            </span>
            <span class="nav-label">главная</span>
        </div>
        <div class="nav-item" id="navHikes">
            <span class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 16L9 7L14 13L18 8L22 16H4Z" stroke="currentColor" stroke-width="1.8" fill="none"/>
                </svg>
            </span>
            <span class="nav-label">хайкинг</span>
        </div>
        <div class="nav-item" id="navMore">
            <span class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                    <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
                    <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
                </svg>
            </span>
            <span class="nav-label">меню</span>
        </div>
    </div>

    <!-- Всплывающее меню с SVG-иконками -->
    <div class="nav-popup" id="navPopup">
        <a href="#" class="popup-item" id="popupChat">
            <span class="popup-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 20L8 16H20V6H4V20Z" stroke="currentColor" stroke-width="1.8" fill="none"/>
                    <circle cx="8" cy="11" r="1" fill="currentColor"/>
                    <circle cx="12" cy="11" r="1" fill="currentColor"/>
                    <circle cx="16" cy="11" r="1" fill="currentColor"/>
                </svg>
            </span>
            <span class="popup-label">чат</span>
        </a>
        <a href="#" class="popup-item" id="popupChannel">
            <span class="popup-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="6" width="16" height="12" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/>
                    <path d="M8 10H16" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M8 14H14" stroke="currentColor" stroke-width="1.8"/>
                </svg>
            </span>
            <span class="popup-label">канал клуба</span>
        </a>
        <a href="#" class="popup-item" id="popupGift">
            <span class="popup-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="8" width="16" height="12" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/>
                    <path d="M12 4V20" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M8 4L12 8L16 4" stroke="currentColor" stroke-width="1.8"/>
                </svg>
            </span>
            <span class="popup-label">подарить карту</span>
        </a>
    </div>

    <div id="initial-loader" class="initial-loader"></div>
    <script src="app.js"></script>
</body>
</html>
