<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>хайкинг интеллигенция</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div id="subtitle" class="subtitle"></div>
        </header>
        <main id="mainContent" class="content"></main>
    </div>

    <div class="bottom-nav" id="bottomNav">
        <div class="bottom-nav-left">
            <div class="nav-item" id="navHome">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 10L12 4L19 10V19H15V15H9V19H5V10Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </span>
                <span class="nav-label">главная</span>
            </div>
            <div class="nav-item" id="navHikes">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
                        <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.8"/>
                        <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.8"/>
                        <line x1="3" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                </span>
                <span class="nav-label">хайкинг</span>
            </div>
            <div class="nav-item" id="navProfiles">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" stroke="currentColor" stroke-width="1.8" fill="none"/>
                    </svg>
                </span>
                <span class="nav-label">интеллигенты</span>
                <span class="nav-badge">скоро</span>
            </div>
        </div>
        <div class="bottom-nav-right">
            <div class="nav-item nav-more" id="navMore">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                        <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
                        <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
                    </svg>
                </span>
                <span class="nav-label">меню</span>
            </div>
        </div>
    </div>

    <div class="nav-popup" id="navPopup">
        <a href="#" class="popup-item" id="popupChat">💬 чат</a>
        <a href="#" class="popup-item" id="popupChannel">📰 канал клуба</a>
        <a href="#" class="popup-item" id="popupGift">🎁 подарить карту</a>
        <a href="#" class="popup-item" id="popupNewcomer">🫖 для новичков</a>
        <a href="#" class="popup-item" id="popupPass">🪪 пропуск в заповедник</a>
        <a href="#" class="popup-item" id="popupQuestion">💬 задать вопрос</a>
    </div>

    <div id="initial-loader" class="initial-loader"></div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
